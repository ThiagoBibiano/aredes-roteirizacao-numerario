<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#fffaf5"/>
  <text x="70" y="90" fill="#143642" font-family="Verdana, sans-serif" font-size="40" font-weight="700">Leitura da demanda operacional</text>
  <text x="70" y="132" fill="#52616b" font-family="Verdana, sans-serif" font-size="24">Cada ordem combina servico, janela, volume, valor e penalidade.</text>

  <rect x="80" y="200" width="1120" height="420" rx="34" fill="#ffffff" stroke="#ead7c3" stroke-width="4"/>
  <rect x="130" y="260" width="310" height="300" rx="24" fill="#2a9d8f"/>
  <text x="180" y="325" fill="#ffffff" font-family="Verdana, sans-serif" font-size="30" font-weight="700">Ordem</text>
  <text x="180" y="370" fill="#eafffb" font-family="Verdana, sans-serif" font-size="22">id_ponto</text>
  <text x="180" y="405" fill="#eafffb" font-family="Verdana, sans-serif" font-size="22">tipo_servico</text>
  <text x="180" y="440" fill="#eafffb" font-family="Verdana, sans-serif" font-size="22">criticidade</text>
  <text x="180" y="475" fill="#eafffb" font-family="Verdana, sans-serif" font-size="22">classe_planejamento</text>

  <rect x="500" y="260" width="300" height="130" rx="24" fill="#f4a261"/>
  <text x="545" y="315" fill="#143642" font-family="Verdana, sans-serif" font-size="28" font-weight="700">Demanda</text>
  <text x="545" y="355" fill="#143642" font-family="Verdana, sans-serif" font-size="22">valor + volume</text>

  <rect x="500" y="430" width="300" height="130" rx="24" fill="#bc3908"/>
  <text x="545" y="485" fill="#ffffff" font-family="Verdana, sans-serif" font-size="28" font-weight="700">Janela</text>
  <text x="545" y="525" fill="#fde6de" font-family="Verdana, sans-serif" font-size="22">inicio, fim e servico</text>

  <rect x="860" y="260" width="280" height="300" rx="24" fill="#143642"/>
  <text x="900" y="325" fill="#ffffff" font-family="Verdana, sans-serif" font-size="28" font-weight="700">Decisao</text>
  <text x="900" y="370" fill="#d7e3ea" font-family="Verdana, sans-serif" font-size="22">atender?</text>
  <text x="900" y="405" fill="#d7e3ea" font-family="Verdana, sans-serif" font-size="22">quando?</text>
  <text x="900" y="440" fill="#d7e3ea" font-family="Verdana, sans-serif" font-size="22">com qual viatura?</text>
  <text x="900" y="475" fill="#d7e3ea" font-family="Verdana, sans-serif" font-size="22">com qual custo?</text>
</svg>
